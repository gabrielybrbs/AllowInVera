<svg width="520" height="200" viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg">
  
  <style>
    :root {
      --bg: #ffffff;
      --text-main: #0f172a;
      --text-secondary: #16a34a;
      --accent: #22c55e;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --text-main: #ffffff;
        --text-secondary: #22c55e;
        --accent: #22c55e;
      }
    }

    .bg { fill: var(--bg); }
    .small { font: 16px 'Inter', sans-serif; letter-spacing: 3px; fill: var(--text-secondary); }
    .main { font: 60px 'Inter', sans-serif; font-weight: 600; fill: var(--text-main); }
    .line { stroke: var(--text-main); stroke-width: 2; }
    .dot { fill: var(--text-main); }
  </style>

  <!-- Fundo -->
  <rect width="100%" height="100%" class="bg"></rect>

  <!-- Ícone Aloe Tech -->
  <g transform="translate(40,30)">
    
    <!-- Folhas -->
    <path d="M50 120 L65 20 L80 120 Z" fill="var(--accent)"></path>
    <path d="M50 120 L20 60 L45 30 Z" fill="#16a34a"></path>
    <path d="M80 120 L110 60 L85 30 Z" fill="#16a34a"></path>

    <!-- Linhas tech -->
    <line x1="65" y1="30" x2="65" y2="90" class="line"></line>
    <circle cx="65" cy="100" r="3" class="dot"></circle>

    <line x1="45" y1="50" x2="30" y2="70" class="line"></line>
    <circle cx="25" cy="75" r="3" class="dot"></circle>

    <line x1="85" y1="50" x2="100" y2="70" class="line"></line>
    <circle cx="105" cy="75" r="3" class="dot"></circle>
  </g>

  <!-- Texto -->
  <text x="140" y="70" class="small">ALLOW IN</text>
  <text x="140" y="135" class="main">Vera</text>

</svg>