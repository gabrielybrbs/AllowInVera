<svg width="16" height="16" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

  <style>
    :root {
      --bg: #ffffff;
      --leaf-main: #22c55e;
      --leaf-side: #16a34a;
      --line: #0f172a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --line: #ffffff;
      }
    }
  </style>

  <!-- Fundo -->
  <rect width="120" height="120" rx="24" fill="var(--bg)"></rect>

  <!-- Centralizado de verdade -->
  <g transform="translate(0,0) scale(1)">
    
    <!-- Folha central -->
    <path d="M50 120 L65 20 L80 120 Z" fill="var(--leaf-main)"></path>
    
    <!-- Folhas laterais -->
    <path d="M50 120 L20 60 L45 30 Z" fill="var(--leaf-side)"></path>
    <path d="M80 120 L110 60 L85 30 Z" fill="var(--leaf-side)"></path>

    <!-- Circuitos -->
    <line x1="65" y1="30" x2="65" y2="90" stroke="var(--line)" stroke-width="6"></line>
    <circle cx="65" cy="100" r="6" fill="var(--line)"></circle>

    <line x1="45" y1="50" x2="30" y2="70" stroke="var(--line)" stroke-width="6"></line>
    <circle cx="25" cy="75" r="6" fill="var(--line)"></circle>

    <line x1="85" y1="50" x2="100" y2="70" stroke="var(--line)" stroke-width="6"></line>
    <circle cx="105" cy="75" r="6" fill="var(--line)"></circle>

  </g>

</svg>