<svg width="520" height="200" viewBox="0 0 520 200" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Fundo escuro -->
  <rect width="100%" height="100%" fill="#020617"></rect>

  <style>
    .small { font: 16px 'Inter', sans-serif; letter-spacing: 3px; fill: #22c55e; }
    .main { font: 60px 'Inter', sans-serif; font-weight: 600; fill: #ffffff; }
  </style>

  <!-- Ícone Aloe Tech -->
  <g transform="translate(40,30)">
    
    <!-- Folha central -->
    <path d="M50 120 L65 20 L80 120 Z" fill="#22c55e"></path>
    
    <!-- Folhas laterais -->
    <path d="M50 120 L20 60 L45 30 Z" fill="#16a34a"></path>
    <path d="M80 120 L110 60 L85 30 Z" fill="#16a34a"></path>

    <!-- Linhas tech (brancas) -->
    <line x1="65" y1="30" x2="65" y2="90" stroke="#ffffff" stroke-width="2"></line>
    <circle cx="65" cy="100" r="3" fill="#ffffff"></circle>

    <line x1="45" y1="50" x2="30" y2="70" stroke="#ffffff" stroke-width="2"></line>
    <circle cx="25" cy="75" r="3" fill="#ffffff"></circle>

    <line x1="85" y1="50" x2="100" y2="70" stroke="#ffffff" stroke-width="2"></line>
    <circle cx="105" cy="75" r="3" fill="#ffffff"></circle>

  </g>

  <!-- Texto -->
  <text x="140" y="70" class="small">ALLOW IN</text>
  <text x="140" y="135" class="main">Vera</text>

</svg>